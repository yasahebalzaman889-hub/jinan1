<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>جمعية</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Cairo',sans-serif;
margin:0;
direction:rtl;
color:#222;
background:linear-gradient(160deg,#ffffff 60%, #dff3e6 100%);
}

/* الهيدر */

.header{
position:relative;
padding:25px;
}

.logo{
position:absolute;
right:25px;
top:10px;
height:75px;
}

.title{
text-align:center;
font-size:28px;
font-weight:700;
color:#000;
}

/* المحتوى */

.container{
max-width:700px;
margin:auto;
padding:40px 20px;
}

/* القائمة */

.menu{
display:flex;
flex-direction:column;
gap:16px;
}

/* المربعات */

.menu a{
display:flex;
justify-content:space-between;
align-items:center;
text-decoration:none;
background:white;
padding:18px;
border-radius:12px;
font-size:18px;
font-weight:600;
color:#222;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
transition:all .25s ease;
}

/* تأثير الحركة */

.menu a:hover{
color:#2f8f5b;
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.arrow{
font-size:18px;
opacity:0.6;
}

/* موبايل */

@media (max-width:600px){

.logo{
height:60px;
}

.title{
font-size:24px;
}

.menu a{
font-size:17px;
}

}

</style>
</head>

<body>

<div class="header">

<img src="logo.png" class="logo">

<div class="title">جمعية قاضي الحوائج </div>

</div>

<div class="container">

<div class="menu">

<a href="introduction.html">
المقدمة
<span class="arrow">←</span>
</a>

<a href="about.html">
نبذة عن تأسيس الجمعية
<span class="arrow">←</span>
</a>

<a href="strategy.html">
التوجه الاستراتيجي للجمعية
<span class="arrow">←</span>
</a>

<a href="goals.html">
أهداف الجمعية
<span class="arrow">←</span>
</a>

</div>

</div>

</body>
</html>
