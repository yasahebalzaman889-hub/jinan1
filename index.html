<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>جمعية</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Cairo',sans-serif;
margin:0;
background:#f4e9da;
direction:rtl;
color:#1a1a1a;
}

/* الهيدر */

.header{
position:relative;
padding:25px;
background:white;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

/* اللوغو */

.logo{
position:absolute;
right:25px;
top:15px;
height:75px;
}

/* اسم الجمعية */

.title{
text-align:center;
font-size:28px;
font-weight:700;
}

/* المحتوى */

.container{
max-width:800px;
margin:auto;
padding:40px 20px;
}

/* القائمة */

.menu{
display:flex;
flex-direction:column;
gap:18px;
margin-top:30px;
}

/* المربعات */

.menu a{
display:flex;
align-items:center;
justify-content:space-between;
text-decoration:none;
background:white;
padding:18px 22px;
border-radius:16px;
font-size:18px;
font-weight:600;
color:#222;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
transition:all .25s ease;
}

/* تأثير الحركة */

.menu a:hover{
transform:translateY(-4px);
box-shadow:0 12px 30px rgba(0,0,0,0.1);
color:#0b3d91;
}

/* السهم */

.arrow{
font-size:20px;
opacity:0.6;
}

/* موبايل */

@media (max-width:600px){

.logo{
height:60px;
top:12px;
}

.title{
font-size:24px;
}

.menu a{
font-size:17px;
padding:16px;
}

}

</style>
</head>

<body>

<div class="header">

<img src="logo.png" class="logo">

<div class="title">جمعية قاضي الحوائج </div>

</div>


<div class="container">

<div class="menu">

<a href="introduction.html">
المقدمة
<span class="arrow">←</span>
</a>

<a href="about.html">
نبذة عن تأسيس الجمعية
<span class="arrow">←</span>
</a>

<a href="strategy.html">
التوجه الاستراتيجي للجمعية
<span class="arrow">←</span>
</a>

<a href="goals.html">
أهداف الجمعية
<span class="arrow">←</span>
</a>

</div>

</div>

</body>
</html>
