<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جمعية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #1b5e20; 
            --primary-light: #4caf50;
            --bg-gradient: linear-gradient(135deg, #1b5e20 0%, #4caf50 100%);
        }

        /* حركات الظهور */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            direction: rtl;
            background: var(--bg-gradient);
            color: #222;
            min-height: 100vh;
        }

        /* الهيدر */
        .header {
            position: relative;
            padding: 30px 20px;
            text-align: center;
        }

        .logo {
            height: 75px;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .title {
            font-size: 30px;
            font-weight: 700;
            color: white; /* جعلته أبيض ليتناسب مع الخلفية الخضراء */
            margin: 0;
        }

        /* الموجة */
        .wave-container {
            line-height: 0;
            width: 100%;
        }

        .wave-container svg {
            width: 100%;
            height: auto;
        }

        /* القسم الأبيض */
        .content {
            background: white;
            border-radius: 35px 35px 0 0;
            padding: 40px 20px;
            max-width: 700px;
            margin: -1px auto 0;
            min-height: 50vh;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.1);
        }

        /* القائمة */
        .menu {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .menu a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            background: #f9f9f9;
            padding: 18px 25px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            color: #222;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            animation: fadeInUp 0.5s ease backwards;
        }

        /* توقيت ظهور الأزرار بالتوالي */
        .menu a:nth-child(1) { animation-delay: 0.1s; }
        .menu a:nth-child(2) { animation-delay: 0.2s; }
        .menu a:nth-child(3) { animation-delay: 0.3s; }
        .menu a:nth-child(4) { animation-delay: 0.4s; }

        .menu a:hover {
            color: var(--primary-light);
            background: #fff;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-color: #eee;
        }

        .arrow {
            opacity: 0.6;
            font-size: 20px;
            transition: transform 0.3s ease;
        }

        .menu a:hover .arrow {
            transform: translateX(-5px);
            opacity: 1;
        }

        @media (max-width: 600px) {
            .logo { height: 60px; }
            .title { font-size: 24px; }
            .content { padding: 30px 15px; }
        }
    </style>
</head>
<body>

<div class="header">
    <img src="logo.png" class="logo" alt="Logo">
    <div class="title">جمعية قاضي الحوائج</div>
</div>

<div class="wave-container">
    <svg viewBox="0 0 1440 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path fill="#ffffff" fill-opacity="1" 
        d="M0,96L60,101.3C120,107,240,117,360,122.7C480,128,600,128,720,112C840,96,960,64,1080,69.3C1200,75,1320,117,1380,138.7L1440,160L1440,320L0,320Z">
        </path>
    </svg>
</div>

<div class="content">
    <div class="menu">
        <a href="introduction.html">
            <span>المقدمة</span>
            <span class="arrow">←</span>
        </a>

        <a href="about.html">
            <span>نبذة عن تأسيس الجمعية</span>
            <span class="arrow">←</span>
        </a>

        <a href="strategy.html">
            <span>التوجه الاستراتيجي للجمعية</span>
            <span class="arrow">←</span>
        </a>

        <a href="goals.html">
            <span>أهداف الجمعية</span>
            <span class="arrow">←</span>
        </a>
    </div>
</div>

</body>
</html>
