<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جمعية قاضي الحوائج</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* درجات الأزرق السحابي والرمادي الناعم */
            --primary-blue: #455a64;   /* أزرق رمادي رزين */
            --light-blue: #eceff1;     /* أبيض مائل للزرقة ناعم جداً */
            --accent-blue: #607d8b;    /* لون تفاعلي */
            --bg-gradient: linear-gradient(135deg, #f5f7f9 0%, #dae1e7 100%);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            direction: rtl;
            background: var(--bg-gradient);
            color: var(--primary-blue);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            max-width: 600px;
            padding: 50px 20px 20px 20px;
            text-align: center;
            box-sizing: border-box;
        }

        .logo {
            height: 90px;
            margin-bottom: 15px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.05));
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            color: var(--primary-blue);
            margin: 0;
            position: relative;
            display: inline-block;
        }

        /* خط صغير تحت العنوان للزينة */
        .title::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background: var(--accent-blue);
            margin: 8px auto 0;
            border-radius: 2px;
        }

        .menu-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
            flex: 1;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .menu a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            background: #ffffff;
            padding: 16px 25px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-blue);
            border: 1px solid rgba(0,0,0,0.03);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.5s ease-out backwards;
        }

        .menu a:hover {
            transform: translateX(-5px); /* حركة جانبية بسيطة بدل الصعود */
            background: var(--light-blue);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .contact-section {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
            text-align: center;
            margin-top: auto;
        }

        .contact-text {
            font-size: 15px;
            margin-bottom: 20px;
            color: #78909c;
        }

        .phone-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--primary-blue);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(69, 90, 100, 0.3);
            transition: all 0.3s ease;
            direction: ltr;
        }

        .phone-button:hover {
            background: #37474f;
            box-shadow: 0 6px 20px rgba(69, 90, 100, 0.4);
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .menu-container { max-width: 90%; }
        }
    </style>
</head>
<body>

<div class="header">
    <img src="logo.png" class="logo" alt="Logo">
    <div class="title">جمعية قاضي الحوائج</div>
</div>

<div class="menu-container">
    <div class="menu">
        <a href="introduction.html" style="animation-delay: 0.1s;">
            <span>المقدمة</span>
            <span style="font-size: 20px;">+</span>
        </a>
        <a href="about.html" style="animation-delay: 0.2s;">
            <span>نبذة عن تأسيس الجمعية</span>
            <span style="font-size: 20px;">+</span>
        </a>
        <a href="strategy.html" style="animation-delay: 0.3s;">
            <span>التوجه الاستراتيجي للجمعية</span>
            <span style="font-size: 20px;">+</span>
        </a>
        <a href="goals.html" style="animation-delay: 0.4s;">
            <span>أهداف الجمعية</span>
            <span style="font-size: 20px;">+</span>
        </a>
    </div>
</div>

<div class="contact-section">
    <div class="contact-text">
        للمساهمة أو الاستفسار، يسعدنا تواصلكم:
    </div>
    
    <a href="tel:00961" class="phone-button">
        <span>📞</span>
        <span>+961 </span>
    </a>
</div>

</body>
</html>
