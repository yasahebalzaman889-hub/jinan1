<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جمعية قاضي الحوائج</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #1b5e20; 
            --primary-light: #4caf50;
            --bg-gradient: linear-gradient(135deg, #1b5e20 0%, #4caf50 100%);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            direction: rtl;
            background: var(--bg-gradient);
            color: #222;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* الهيدر */
        .header {
            position: relative;
            padding: 50px 20px 30px 20px;
            text-align: center;
        }

        .logo {
            height: 120px;
            width: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.15));
            transition: transform 0.3s ease;
        }

        .title {
            font-size: 34px;
            font-weight: 700;
            color: white; 
            margin: 0;
        }

        /* الموجة */
        .wave-container {
            line-height: 0;
            width: 100%;
        }

        .wave-container svg {
            width: 100%;
            height: auto;
        }

        /* القسم الأبيض */
        .content {
            background: white;
            border-radius: 40px 40px 0 0;
            padding: 40px 25px;
            max-width: 700px;
            margin: -2px auto 0;
            flex: 1; /* ليأخذ المساحة المتاحة */
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.1);
        }

        /* القائمة */
        .menu {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 40px;
        }

        .menu a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            background: #f9f9f9;
            padding: 20px 25px;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 600;
            color: #222;
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.02);
            animation: fadeInUp 0.5s ease backwards;
        }

        .menu a:hover {
            color: var(--primary-light);
            background: #fff;
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            border-color: #eee;
        }

        .arrow {
            opacity: 0.6;
            font-size: 22px;
            color: var(--primary-light);
        }

        /* قسم الاتصال (بأسفل الصفحة في المنطقة الخضراء) */
        .contact-section {
            background: rgba(255, 255, 255, 0.1);
            margin: 20px;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeInUp 0.8s ease backwards;
            animation-delay: 0.6s;
        }

        .contact-text {
            font-size: 18px;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .phone-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: white;
            color: var(--primary-dark);
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .phone-link:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }

        @media (max-width: 600px) {
            .logo { height: 95px; }
            .title { font-size: 26px; }
            .contact-text { font-size: 16px; }
            .phone-link { font-size: 18px; }
        }
    </style>
</head>
<body>

<div class="header">
    <img src="logo.png" class="logo" alt="Logo">
    <div class="title"> جمعية قاضي الحوائج</div>
</div>

<div class="wave-container">
    <svg viewBox="0 0 1440 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path fill="#ffffff" d="M0,96L60,101.3C120,107,240,117,360,122.7C480,128,600,128,720,112C840,96,960,64,1080,69.3C1200,75,1320,117,1380,138.7L1440,160L1440,320L0,320Z"></path>
    </svg>
</div>

<div class="content">
    <div class="menu">
        <a href="introduction.html">
            <span>المقدمة</span>
            <span class="arrow">←</span>
        </a>
        <a href="about.html">
            <span>نبذة عن تأسيس الجمعية</span>
            <span class="arrow">←</span>
        </a>
        <a href="strategy.html">
            <span>التوجه الاستراتيجي للجمعية</span>
            <span class="arrow">←</span>
        </a>
        <a href="goals.html">
            <span>أهداف الجمعية</span>
            <span class="arrow">←</span>
        </a>
    </div>
</div>

<div class="contact-section">
    <div class="contact-text">
        من يرغب بالانضمام إلى <strong>جمعية قاضي الحوائج</strong> أو المساهمة في أعمالها، يسعدنا تواصلكم معنا عبر الرقم التالي:
    </div>
    <a href="tel:0096100000000" class="phone-link">
        <span>📞</span>
        <span dir="ltr">+961 71325197</span>
    </a>
</div>

</body>
</html>
