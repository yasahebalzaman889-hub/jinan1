<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جمعية قاضي الحوائج</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* درجات الأسود الفاتح والرمادي الفحمي */
            --bg-start: #2c2c2c;      /* أسود فاتح/رمادي داكن */
            --bg-end: #484848;        /* رمادي متوسط */
            --card-bg: rgba(255, 255, 255, 0.08); /* خلفية شفافة للأزرار */
            --text-main: #ffffff;
            --accent-border: #666666; /* حدود رمادية */
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            direction: rtl;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* الهيدر */
        .header {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px 10px 20px;
            text-align: center;
            box-sizing: border-box;
        }

        .logo {
            height: 100px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3)) brightness(1.2);
            margin-bottom: 15px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin: 0;
            letter-spacing: 1px;
        }

        /* حاوية الأزرار */
        .menu-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            box-sizing: border-box;
            flex: 1;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            background: var(--card-bg);
            padding: 18px 25px;
            border-radius: 15px; /* زوايا أقل حدة لمظهر عصري */
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            border: 1px solid var(--accent-border);
            backdrop-filter: blur(10px); /* تأثير الزجاج الضبابي */
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease-out backwards;
        }

        .menu a:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
            border-color: #ffffff;
        }

        /* قسم الاتصال */
        .contact-section {
            width: 100%;
            max-width: 600px;
            padding: 30px 20px;
            text-align: center;
            margin-top: auto;
        }

        .contact-text {
            font-size: 15px;
            margin-bottom: 20px;
            opacity: 0.8;
            font-weight: 400;
        }

        /* زر الرقم */
        .phone-circle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #ffffff;
            color: #2c2c2c;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 19px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            direction: ltr;
        }

        .phone-circle:hover {
            background: #e0e0e0;
            transform: translateY(-3px);
        }

        @media (max-width: 600px) {
            .menu-container { max-width: 92%; }
            .logo { height: 80px; }
        }
    </style>
</head>
<body>

<div class="header">
    <img src="logo.png" class="logo" alt="Logo">
    <div class="title">جمعية قاضي الحوائج</div>
</div>

<div class="menu-container">
    <div class="menu">
        <a href="introduction.html" style="animation-delay: 0.1s;">
            <span>المقدمة</span>
            <span>←</span>
        </a>
        <a href="about.html" style="animation-delay: 0.2s;">
            <span>نبذة عن تأسيس الجمعية</span>
            <span>←</span>
        </a>
        <a href="strategy.html" style="animation-delay: 0.3s;">
            <span>التوجه الاستراتيجي للجمعية</span>
            <span>←</span>
        </a>
        <a href="goals.html" style="animation-delay: 0.4s;">
            <span>أهداف الجمعية</span>
            <span>←</span>
        </a>
    </div>
</div>

<div class="contact-section">
    <div class="contact-text">
        من يرغب بالانضمام أو المساهمة، الاتصال على الرقم:
    </div>
    
    <a href="tel:00961" class="phone-circle">
        <span>📞</span>
        <span>+961 </span>
    </a>
</div>

</body>
</html>
