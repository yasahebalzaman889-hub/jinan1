<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>جمعية</title>

<style>

body{
font-family: "Segoe UI", Arial, sans-serif;
margin:0;
background:linear-gradient(135deg,#f7f9fc,#eef2f7);
direction: rtl;
}

/* الهيدر */

.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:20px 30px;
background:white;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

.logo{
height:60px;
order:1;
}

.title{
font-size:26px;
font-weight:700;
color:#111;
order:2;
}

/* المحتوى */

.container{
max-width:750px;
margin:auto;
padding:40px 20px;
}

/* القائمة */

.menu{
display:flex;
flex-direction:column;
gap:18px;
margin-top:30px;
}

/* المربعات */

.menu a{
text-decoration:none;
background:white;
padding:18px;
border-radius:14px;
font-size:18px;
color:#111;
font-weight:600;
box-shadow:0 8px 20px rgba(0,0,0,0.06);
transition:all 0.25s ease;
}

/* تأثير الماوس */

.menu a:hover{
transform:translateY(-3px);
color:#0b3d91;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* الموبايل */

@media (max-width:600px){

.title{
font-size:22px;
}

.logo{
height:50px;
}

.menu a{
font-size:17px;
padding:16px;
}

}

</style>
</head>

<body>

<div class="header">

<img src="logo.png" class="logo">

<div class="title">جمعية</div>

</div>

<div class="container">

<div class="menu">

<a href="introduction.html">المقدمة</a>

<a href="about.html">نبذة عن تأسيس الجمعية</a>

<a href="strategy.html">التوجه الاستراتيجي للجمعية</a>

<a href="goals.html">أهداف الجمعية</a>

</div>

</div>

</body>
</html>
