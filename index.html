<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جمعية قاضي الحوائج</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #1b5e20; 
            --primary-light: #4caf50;
            --bg-gradient: linear-gradient(135deg, #1b5e20 0%, #4caf50 100%);
            --text-color: #222;
        }

        /* أنيميشن الظهور من الأسفل */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            direction: rtl;
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center; /* لتوسيط المحتوى */
        }

        /* الهيدر */
        .header {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px 10px 20px;
            text-align: center;
            box-sizing: border-box;
        }

        .logo {
            height: 100px; /* تصغير قليل للوغو ليتناسب مع التصميم الأنم */
            width: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
        }

        .title {
            font-size: 28px; /* تصغير الخط قليلاً */
            font-weight: 700;
            color: white; 
            margin: 0;
        }

        /* حاوية القائمة (بدون خلفية بيضاء) */
        .menu-container {
            width: 100%;
            max-width: 500px; /* تقليل عرض الحاوية ليكون التصميم ملموم */
            padding: 20px;
            box-sizing: border-box;
            flex: 1;
            display: flex;
            align-items: center; /* لتوسيط الأزرار عمودياً في المساحة المتاحة */
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 15px; /* المسافة بين الأزرار */
            width: 100%;
        }

        /* تصميم الأزرار الجديد */
        .menu a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.95); /* خلفية بيضاء شفافة قليلاً */
            padding: 15px 20px; /* تقليل الـ padding (تصغير المربع) */
            border-radius: 50px; /* زوايا دائرية بالكامل (Pill shape) */
            font-size: 16px; /* تصغير الخط */
            font-weight: 600;
            color: var(--primary-dark); /* لون النص أخضر غامق */
            
            /* إضافة الإطار الأخضر */
            border: 2px solid var(--primary-light); 
            
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            
            /* تفعيل الأنيميشن */
            animation: fadeInUp 0.6s ease-out backwards;
        }

        /* توقيت الأنيميشن لكل زر (ظهور متتالي) */
        .menu a:nth-child(1) { animation-delay: 0.1s; }
        .menu a:nth-child(2) { animation-delay: 0.2s; }
        .menu a:nth-child(3) { animation-delay: 0.3s; }
        .menu a:nth-child(4) { animation-delay: 0.4s; }

        /* تأثير التمرير (Hover) */
        .menu a:hover {
            background: white;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border-color: var(--primary-dark); /* تغيير لون الإطار عند الهوفر */
        }

        .arrow {
            font-size: 18px;
            transition: transform 0.3s ease;
        }

        .menu a:hover .arrow {
            transform: translateX(-5px); /* تحريك السهم */
        }

        /* قسم الاتصال */
        .contact-section {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            text-align: center;
            color: white;
            box-sizing: border-box;
            margin-top: auto; /* ليبقى في الأسفل */
        }

        .contact-text {
            font-size: 16px;
            margin-bottom: 10px;
            line-height: 1.5;
            opacity: 0.9;
        }

        .phone-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 20px;
            direction: ltr; /* لعرض الرقم بشكل صحيح */
        }

        /* استعلامات الوسائط للموبايل */
        @media (max-width: 600px) {
            .menu-container { max-width: 90%; padding: 10px; }
            .logo { height: 80px; }
            .title { font-size: 24px; }
            .menu a { padding: 12px 18px; font-size: 15px; }
        }
    </style>
</head>
<body>

<div class="header">
    <img src="logo.png" class="logo" alt="Logo">
    <div class="title">جمعية قاضي الحوائج</div>
</div>

<div class="menu-container">
    <div class="menu">
        <a href="introduction.html">
            <span>المقدمة</span>
            <span class="arrow">←</span>
        </a>
        <a href="about.html">
            <span>نبذة عن تأسيس الجمعية</span>
            <span class="arrow">←</span>
        </a>
        <a href="strategy.html">
            <span>التوجه الاستراتيجي للجمعية</span>
            <span class="arrow">←</span>
        </a>
        <a href="goals.html">
            <span>أهداف الجمعية</span>
            <span class="arrow">←</span>
        </a>
    </div>
</div>

<div class="contact-section">
    <div class="contact-text">
        من يرغب بالانضمام إلى <strong>جمعية قاضي الحوائج</strong> أو المساهمة في أعمالها الاتصال على الرقم:
    </div>
    <a href="tel:0096171325197" class="phone-link">
        +961 71 32 51 97
    </a>
</div>

</body>
</html>
