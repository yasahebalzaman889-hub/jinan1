<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جمعية قاضي الحوائج</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* درجات اللون العسلي والذهبي الهادئ */
            --primary-dark: #8d6e63;  /* بني عسلي غامق للنصوص */
            --primary-light: #ffb74d; /* عسلي فاتح للحدود */
            --bg-gradient: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%); /* خلفية عسلية كريمية */
            --accent-color: #fb8c00;  /* لون تأكيدي */
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            direction: rtl;
            background: var(--bg-gradient);
            color: #4e342e; /* بني محروق للقراءة */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* الهيدر */
        .header {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px 10px 20px;
            text-align: center;
            box-sizing: border-box;
        }

        .logo {
            height: 100px;
            filter: drop-shadow(0 4px 8px rgba(141, 110, 99, 0.2));
            margin-bottom: 15px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            color: #6d4c41; 
            margin: 0;
            text-shadow: 1px 1px 1px rgba(255,255,255,0.8);
        }

        /* حاوية الأزرار */
        .menu-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            box-sizing: border-box;
            flex: 1;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 20px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            color: #5d4037;
            border: 2px solid var(--primary-light); 
            box-shadow: 0 4px 15px rgba(210, 180, 140, 0.2);
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease-out backwards;
        }

        .menu a:hover {
            background: white;
            transform: translateY(-3px);
            border-color: var(--accent-color);
            box-shadow: 0 6px 20px rgba(210, 180, 140, 0.4);
        }

        /* قسم الاتصال المطور */
        .contact-section {
            width: 100%;
            max-width: 600px;
            padding: 30px 20px;
            text-align: center;
            color: #5d4037;
            margin-top: auto;
        }

        .contact-text {
            font-size: 16px;
            margin-bottom: 20px;
            line-height: 1.6;
            font-weight: 600;
        }

        /* تصميم الدائرة المحيطة بالرقم */
        .phone-circle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: white;
            color: #ef6c00;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            direction: ltr;
        }

        .phone-circle:hover {
            transform: scale(1.05);
            background: #ef6c00;
            color: white;
        }

        @media (max-width: 600px) {
            .menu-container { max-width: 90%; }
            .logo { height: 85px; }
            .phone-circle { font-size: 18px; padding: 10px 20px; }
        }
    </style>
</head>
<body>

<div class="header">
    <img src="logo.png" class="logo" alt="Logo">
    <div class="title">جمعية قاضي الحوائج</div>
</div>

<div class="menu-container">
    <div class="menu">
        <a href="introduction.html" style="animation-delay: 0.1s;">
            <span>المقدمة</span>
            <span>←</span>
        </a>
        <a href="about.html" style="animation-delay: 0.2s;">
            <span>نبذة عن تأسيس الجمعية</span>
            <span>←</span>
        </a>
        <a href="strategy.html" style="animation-delay: 0.3s;">
            <span>التوجه الاستراتيجي للجمعية</span>
            <span>←</span>
        </a>
        <a href="goals.html" style="animation-delay: 0.4s;">
            <span>أهداف الجمعية</span>
            <span>←</span>
        </a>
    </div>
</div>

<div class="contact-section">
    <div class="contact-text">
        من يرغب بالانضمام إلى <strong>جمعية قاضي الحوائج</strong> أو المساهمة في أعمالها، الاتصال على الرقم:
    </div>
    
    <a href="tel:00961" class="phone-circle">
        <span>📞</span>
        <span>+961 </span>
    </a>
</div>

</body>
</html>
