<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جمعية قاضي الحوائج</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* ألوان حديثة: أبيض عاجي، رمادي دافئ، ولمسة ذهبية مطفية */
            --main-bg: #fdfdfd;
            --text-color: #2d3436;
            --accent-gold: #b5995d; 
            --soft-gray: #f2f2f2;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            direction: rtl;
            background-color: var(--main-bg);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* الهيدر */
        .header {
            width: 100%;
            max-width: 600px;
            padding: 60px 20px 30px 20px;
            text-align: center;
            box-sizing: border-box;
        }

        .logo {
            height: 110px;
            margin-bottom: 20px;
            /* جعل اللوجو يبرز بنعومة */
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.08));
        }

        .title {
            font-size: 30px;
            font-weight: 700;
            color: var(--text-color);
            margin: 0;
            letter-spacing: -0.5px;
        }

        /* حاوية الأزرار - ديزاين "نظيف" */
        .menu-container {
            width: 100%;
            max-width: 460px;
            padding: 20px;
            box-sizing: border-box;
            flex: 1;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .menu a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            background: white;
            padding: 20px 25px;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 600;
            color: var(--text-color);
            border: 1px solid var(--soft-gray);
            box-shadow: var(--card-shadow);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            animation: fadeInUp 0.6s ease-out backwards;
        }

        .menu a:hover {
            transform: translateY(-5px);
            border-color: var(--accent-gold);
            box-shadow: 0 15px 35px rgba(181, 153, 93, 0.15);
        }

        /* السهم الجانبي بتصميم أرقى */
        .arrow {
            color: var(--accent-gold);
            font-size: 20px;
            transition: transform 0.3s ease;
        }

        .menu a:hover .arrow {
            transform: translateX(-5px);
        }

        /* قسم الاتصال المطور */
        .contact-section {
            width: 100%;
            max-width: 600px;
            padding: 50px 20px;
            text-align: center;
            margin-top: auto;
            background: linear-gradient(to top, #f9f9f9, transparent);
        }

        .contact-text {
            font-size: 16px;
            margin-bottom: 25px;
            line-height: 1.6;
            color: #636e72;
        }

        .phone-circle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: var(--text-color);
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            direction: ltr;
        }

        .phone-circle:hover {
            background: var(--accent-gold);
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            .menu-container { max-width: 90%; }
            .title { font-size: 24px; }
            .logo { height: 90px; }
        }
    </style>
</head>
<body>

<div class="header">
    <img src="logo.png" class="logo" alt="Logo">
    <div class="title">جمعية قاضي الحوائج</div>
</div>

<div class="menu-container">
    <div class="menu">
        <a href="introduction.html" style="animation-delay: 0.1s;">
            <span>المقدمة</span>
            <span class="arrow">←</span>
        </a>
        <a href="about.html" style="animation-delay: 0.2s;">
            <span>نبذة عن تأسيس الجمعية</span>
            <span class="arrow">←</span>
        </a>
        <a href="strategy.html" style="animation-delay: 0.3s;">
            <span>التوجه الاستراتيجي للجمعية</span>
            <span class="arrow">←</span>
        </a>
        <a href="goals.html" style="animation-delay: 0.4s;">
            <span>أهداف الجمعية</span>
            <span class="arrow">←</span>
        </a>
    </div>
</div>

<div class="contact-section">
    <div class="contact-text">
        من يرغب بالانضمام إلى <strong>جمعية قاضي الحوائج</strong> أو المساهمة في أعمالها، الاتصال على الرقم:
    </div>
    
    <a href="tel:00961" class="phone-circle">
        <span>📞</span>
        <span>+961 </span>
    </a>
</div>

</body>
</html>
