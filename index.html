<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جمعية قاضي الحوائج</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #1b5e20; 
            --primary-light: #4caf50;
            --bg-gradient: linear-gradient(135deg, #1b5e20 0%, #4caf50 100%);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            direction: rtl;
            background: var(--bg-gradient);
            color: #222;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center; /* لتوسيط المحتوى بالمنتصف */
        }

        /* الهيدر الجديد: اللوغو والكلمة على نفس السطر */
        .header {
            width: 100%;
            max-width: 550px; /* تقليل العرض */
            padding: 30px 20px;
            display: flex;
            align-items: center;
            justify-content: flex-start; /* تبدأ من اليمين */
            gap: 15px;
            box-sizing: border-box;
        }

        .logo {
            height: 65px; /* قياس وسط واضح */
            width: auto;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            color: white;
            margin: 0;
        }

        /* الموجة */
        .wave-container {
            line-height: 0;
            width: 100%;
            max-width: 550px;
        }

        .wave-container svg {
            width: 100%;
            height: auto;
        }

        /* القسم الأبيض */
        .content {
            background: white;
            border-radius: 30px 30px 0 0;
            padding: 30px 20px;
            width: 100%;
            max-width: 550px; /* تقليل عرض المحتوى */
            margin: -1px auto 0;
            flex: 1;
            box-sizing: border-box;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.1);
        }

        /* القائمة */
        .menu {
            display: flex;
            flex-direction: column;
            gap: 12px; /* تقليل المسافة بين المربعات */
            margin-bottom: 30px;
        }

        .menu a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            background: #f9f9f9;
            padding: 15px 20px; /* تقليل حجم المربعات */
            border-radius: 12px;
            font-size: 16px; /* تصغير الخط قليلاً */
            font-weight: 600;
            color: #222;
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.02);
            animation: fadeInUp 0.5s ease backwards;
        }

        .menu a:hover {
            color: var(--primary-light);
            background: #fff;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .arrow {
            opacity: 0.5;
            font-size: 18px;
        }

        /* قسم الاتصال المحدث: بدون مربعات متداخلة */
        .contact-area {
            width: 100%;
            max-width: 550px;
            padding: 30px 20px;
            text-align: center;
            color: white;
            box-sizing: border-box;
        }

        .contact-area p {
            font-size: 16px;
            margin: 0 0 10px 0;
            line-height: 1.6;
            opacity: 0.9;
        }

        .phone-number {
            display: block;
            font-size: 22px;
            font-weight: 700;
            color: white;
            text-decoration: none;
            direction: ltr; /* لعرض الرقم بشكل صحيح */
        }

        @media (max-width: 600px) {
            .header, .content, .wave-container, .contact-area {
                max-width: 90%; /* للموبايلات الصغيرة */
            }
            .title { font-size: 22px; }
            .logo { height: 55px; }
        }
    </style>
</head>
<body>

<div class="header">
    <img src="logo.png" class="logo" alt="Logo">
    <h1 class="title">جمعية قاضي الحوائج</h1>
</div>

<div class="wave-container">
    <svg viewBox="0 0 1440 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path fill="#ffffff" d="M0,96L60,101.3C120,107,240,117,360,122.7C480,128,600,128,720,112C840,96,960,64,1080,69.3C1200,75,1320,117,1380,138.7L1440,160L1440,320L0,320Z"></path>
    </svg>
</div>

<div class="content">
    <div class="menu">
        <a href="introduction.html">
            <span>المقدمة</span>
            <span class="arrow">←</span>
        </a>
        <a href="about.html">
            <span>نبذة عن تأسيس الجمعية</span>
            <span class="arrow">←</span>
        </a>
        <a href="strategy.html">
            <span>التوجه الاستراتيجي للجمعية</span>
            <span class="arrow">←</span>
        </a>
        <a href="goals.html">
            <span>أهداف الجمعية</span>
            <span class="arrow">←</span>
        </a>
    </div>
</div>

<div class="contact-area">
    <p> من يرغب بالانضمام إلى جمعية قاضي الحوائج أو المساهمة في أعمالها الاتصال عبر الرقم التالي:</p>
    <a href="tel:0096171325197" class="phone-number">
        +961 71 32 51 97
    </a>
</div>

</body>
</html>
